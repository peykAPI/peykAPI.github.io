    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500&display=swap"
          rel="stylesheet">
    <style>
        :root {
            --white: #FFFFFF;
            --blue: #1166BF;
            --blue-dark: #0C4C93;
            --ink: #101828;
            --muted: #6B7280;
            --line: #E7EAF0;
            --font-display: 'Space Grotesk', sans-serif;
            --font-body: 'IBM Plex Sans', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--white);
            color: var(--ink);
            font-family: var(--font-body);
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        ::selection {
            background: var(--blue);
            color: #fff;
        }

        :focus-visible {
            outline: 2px solid var(--blue);
            outline-offset: 3px;
        }

        .shell {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            max-width: 1040px;
            width: 100%;
            margin: 0 auto;
            padding: 32px 24px;
        }

        .logo {
            font-family: var(--font-display);
            font-weight: 700;
            font-size: 1.15rem;
            letter-spacing: -0.02em;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo img {
            width: 28px;
            height: 28px;
            display: block;
            border-radius: 7px;
        }

        .icon {
            width: 1em;
            height: 1em;
            display: block;
            flex-shrink: 0;
        }

        nav .gh {
            font-size: 0.9rem;
            color: var(--muted);
            display: inline-flex;
            align-items: center;
            gap: 7px;
            transition: color .15s ease;
        }

        nav .gh:hover {
            color: var(--ink);
        }

        nav .gh .icon {
            width: 16px;
            height: 16px;
        }

        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .hero {
            max-width: 640px;
            text-align: center;
        }

        .brand-mark {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            margin-bottom: 28px;
            animation: rise 0.7s ease both;
        }

        .brand-mark img {
            width: 88px;
            height: 88px;
            border-radius: 22px;
            box-shadow: 0 18px 40px -18px rgba(16, 24, 40, 0.35);
            animation: float 5s ease-in-out infinite;
        }

        .brand-mark .wordmark {
            font-family: var(--font-display);
            font-weight: 700;
            font-size: 1.35rem;
            letter-spacing: -0.03em;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.82rem;
            color: var(--blue);
            background: rgba(46, 95, 232, 0.08);
            padding: 7px 14px;
            border-radius: 100px;
            margin-bottom: 28px;
            font-weight: 500;
            animation: rise 0.7s ease 0.08s both;
        }

        .badge .icon {
            width: 14px;
            height: 14px;
            color: var(--blue);
        }

        h1 {
            font-family: var(--font-display);
            font-weight: 700;
            font-size: clamp(2.2rem, 6vw, 3.4rem);
            letter-spacing: -0.03em;
            line-height: 1.08;
            margin-bottom: 20px;
            animation: rise 0.7s ease 0.14s both;
        }

        h1 .accent {
            color: var(--blue);
        }

        .lede {
            font-size: 1.08rem;
            color: var(--muted);
            max-width: 460px;
            margin: 0 auto 40px;
            line-height: 1.6;
            animation: rise 0.7s ease 0.2s both;
        }

        .cta-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 22px;
            flex-wrap: wrap;
            animation: rise 0.7s ease 0.26s both;
        }

        .btn-primary {
            font-weight: 600;
            font-size: 0.95rem;
            background: var(--blue);
            color: #fff;
            padding: 14px 28px;
            border-radius: 10px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 8px 20px -8px rgba(46, 95, 232, 0.55);
            transition: background .15s ease, transform .15s ease;
        }

        .btn-primary .icon {
            width: 18px;
            height: 18px;
        }

        .btn-primary:hover {
            background: var(--blue-dark);
            transform: translateY(-1px);
        }

        .btn-secondary {
            font-size: 0.95rem;
            color: var(--muted);
            border-bottom: 1px solid var(--line);
            padding-bottom: 2px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: color .15s ease, border-color .15s ease;
        }

        .btn-secondary .icon {
            width: 16px;
            height: 16px;
        }

        .btn-secondary:hover {
            color: var(--ink);
            border-color: var(--muted);
        }

        footer {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            padding: 28px 24px 36px;
            font-size: 0.8rem;
            color: var(--muted);
        }

        footer .logo {
            font-size: 0.95rem;
            color: var(--ink);
        }

        footer .logo img {
            width: 20px;
            height: 20px;
            border-radius: 5px;
        }

        @keyframes rise {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-6px);
            }
        }

        @media (prefers-reduced-motion: reduce) {
            .brand-mark,
            .badge,
            h1,
            .lede,
            .cta-row,
            .brand-mark img {
                animation: none;
            }
        }
    </style>
</head>

<body>

        <nav>
            <a class="logo" href="./">

                </svg>
                GitHub

        <main>
            <div class="hero">
                <div class="brand-mark">
                    <img src="logo.png" alt="peykAPI" width="88" height="88">
                    <span class="wordmark">peykAPI</span>
                </div>
                <span class="badge">
                    <svg class="icon" viewBox="0 0 24 24" aria-hidden="true" fill="currentColor">
                        <path d="M3 5.5A2.5 2.5 0 0 1 5.5 3H11v8H3V5.5ZM13 3h5.5A2.5 2.5 0 0 1 21 5.5V11h-8V3ZM3 13h8v8H5.5A2.5 2.5 0 0 1 3 18.5V13ZM13 13h8v5.5a2.5 2.5 0 0 1-2.5 2.5H13v-8Z"/>
                    </svg>

                </span>
                <h1>An API client<br>that stays <span class="accent">local</span>.</h1>
                <p class="lede">No forced account, no cloud sync. peykAPI runs on your machine and nowhere else.</p>
                <div class="cta-row">
                    <a class="btn-primary" href="https://github.com/peykAPI/peykapi/releases" target="_blank"
                       rel="noopener">
                        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor"
                             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 3v12"/>
                            <path d="m7 10 5 5 5-5"/>

                    </a>
                    <a class="btn-secondary" href="https://github.com/peykAPI/peykapi" target="_blank"
                       rel="noopener">
                        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true" fill="currentColor">
                            <path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0 1 12 6.844a9.59 9.59 0 0 1 2.504.337c1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0 0 22 12.017C22 6.484 17.522 2 12 2Z"/>
                        </svg>
                        View source
                    </a>
                </div>
            </div>
        </main>

        <footer>
            <a class="logo" href="./">
                <img src="logo.png" alt="" width="20" height="20">
                peykAPI
            </a>
            <span>peykAPI is not affiliated with Postman.</span>
        </footer>
    </div>

</body>
